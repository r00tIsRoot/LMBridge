name: Publish to GitHub Pages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to local repository
        run: ./gradlew clean :lmbridge:publishReleasePublicationToLocalRepository --no-daemon

      - name: Get version from published POM
        id: version
        run: |
          VERSION=$(ls lmbridge/build/repo/com/isroot/lmbridge/ | grep -E '^[0-9]' | head -1)
          echo "Found version in repo: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout Maven repository
        uses: actions/checkout@v4
        with:
          repository: r00tIsRoot/packages
          path: maven-repo
          ref: gh-pages
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Copy published files
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Publishing version: $VERSION"
          mkdir -p maven-repo/com/isroot/lmbridge/$VERSION
          cp -r lmbridge/build/repo/com/isroot/lmbridge/$VERSION/* maven-repo/com/isroot/lmbridge/$VERSION/

      - name: Commit and push
        working-directory: maven-repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          VERSION="${{ steps.version.outputs.VERSION }}"
          git add .
          git diff --staged --quiet || git commit -m "Release v$VERSION"
          git push
