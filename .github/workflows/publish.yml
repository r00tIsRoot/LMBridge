name: Publish to GitHub Pages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to local repository
        run: ./gradlew clean :lmbridge:publishReleasePublicationToLocalRepository --no-daemon

      - name: Checkout Maven repository
        uses: actions/checkout@v4
        with:
          repository: r00tIsRoot/packages
          path: maven-repo
          ref: gh-pages
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy published files
        run: |
          VERSION_TAG="${{ github.ref_name }}"
          if [[ "$VERSION_TAG" == v* ]]; then
            VERSION="${VERSION_TAG#v}"
          else
            VERSION="$VERSION_TAG"
          fi
          echo "Publishing version: $VERSION"
          mkdir -p maven-repo/com/isroot/lmbridge/$VERSION
          cp -r lmbridge/build/repo/com/isroot/lmbridge/* maven-repo/com/isroot/lmbridge/$VERSION/

      - name: Commit and push
        working-directory: maven-repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          VERSION_TAG="${{ github.ref_name }}"
          if [[ "$VERSION_TAG" == v* ]]; then
            VERSION_TAG="${VERSION_TAG#v}"
          fi
          git add .
          git diff --staged --quiet || git commit -m "Release v$VERSION_TAG"
          git push
